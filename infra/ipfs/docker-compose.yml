version: "3.8"

services:
  ipfs:
    # Image can be pinned by setting the IPFS_IMAGE environment variable (recommended).
    # Examples:
    #   - export IPFS_IMAGE=ipfs/kubo:v0.20.0
    #   - echo "IPFS_IMAGE=ipfs/kubo:v0.20.0" > infra/ipfs/.env
    # If not set, the default tag `ipfs/kubo:release` will be used.
    image: "${IPFS_IMAGE:-ipfs/kubo:release}"
    container_name: sj-ipfs
    restart: unless-stopped
    # Expose standard IPFS ports:
    ports:
      - "4001:4001" # swarm TCP
      - "4001:4001/udp" # swarm UDP (libp2p)
      - "5001:5001" # API (HTTP API)
      - "8080:8080" # Gateway (http)
    volumes:
      # Persist IPFS repo on the host so data survives container restarts
      - ipfs_data:/data/ipfs
    environment:
      # Use the 'server' profile to disable UI and enable sensible defaults for a node
      - IPFS_PROFILE=server
      # Allowed web app origin for Kubo CORS (update if UI runs elsewhere)
      - SJ_APP_ORIGIN=http://localhost:1620
    command: >
      sh -lc '
        set -e;

        # Init repo if first run (volume empty)
        if [ ! -f /data/ipfs/config ]; then
          ipfs init --profile=server >/dev/null
        fi

        # CORS for browser -> Kubo API (idempotent)
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Origin "[\"${SJ_APP_ORIGIN}\"]"
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Methods "[\"POST\",\"OPTIONS\"]"
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Headers "[\"Content-Type\"]"
        ipfs config --json API.HTTPHeaders.Access-Control-Allow-Credentials "[\"true\"]"

        exec ipfs daemon --migrate=true --enable-gc
      '
    # Optional healthcheck to ensure the API is responding
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ipfs --api /ip4/127.0.0.1/tcp/5001 version >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: sj-ipfs-net
    driver: bridge

volumes:
  ipfs_data:
    name: sj-ipfs-data
